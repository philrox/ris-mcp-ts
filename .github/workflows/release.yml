name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Generate release notes
        id: notes
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            # First release — use all commits
            COMMITS=$(git log --oneline --no-merges "$CURRENT_TAG")
          else
            COMMITS=$(git log --oneline --no-merges "$PREV_TAG..$CURRENT_TAG")
          fi

          # Group commits by conventional commit type
          FEATURES=$(echo "$COMMITS" | grep -E '^\w+ feat(\(.+\))?:' | sed 's/^\w\+ feat\(([^)]*)\)\?:\s*//' || true)
          FIXES=$(echo "$COMMITS" | grep -E '^\w+ fix(\(.+\))?:' | sed 's/^\w\+ fix\(([^)]*)\)\?:\s*//' || true)
          DOCS=$(echo "$COMMITS" | grep -E '^\w+ docs(\(.+\))?:' | sed 's/^\w\+ docs\(([^)]*)\)\?:\s*//' || true)
          CI_CHORE=$(echo "$COMMITS" | grep -E '^\w+ (ci|chore|refactor|test)(\(.+\))?:' | sed 's/^\w\+ \w\+\(([^)]*)\)\?:\s*//' || true)

          # Build release notes
          NOTES="## What's Changed"$'\n'

          if [ -n "$FEATURES" ]; then
            NOTES+=$'\n'"### Features"$'\n'
            while IFS= read -r line; do
              NOTES+="- $line"$'\n'
            done <<< "$FEATURES"
          fi

          if [ -n "$FIXES" ]; then
            NOTES+=$'\n'"### Bug Fixes"$'\n'
            while IFS= read -r line; do
              NOTES+="- $line"$'\n'
            done <<< "$FIXES"
          fi

          if [ -n "$DOCS" ]; then
            NOTES+=$'\n'"### Documentation"$'\n'
            while IFS= read -r line; do
              NOTES+="- $line"$'\n'
            done <<< "$DOCS"
          fi

          if [ -n "$CI_CHORE" ]; then
            NOTES+=$'\n'"### Other"$'\n'
            while IFS= read -r line; do
              NOTES+="- $line"$'\n'
            done <<< "$CI_CHORE"
          fi

          NOTES+=$'\n'"**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG"

          # Write to file for the release step
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md

      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-lightsail:
    name: Deploy to Lightsail
    needs: release
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-central-1
      SERVICE_NAME: ris-mcp

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lightsail plugin
        run: |
          curl -s "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" \
            -o /usr/local/bin/lightsailctl && chmod +x /usr/local/bin/lightsailctl

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t $SERVICE_NAME .
          aws lightsail push-container-image \
            --service-name $SERVICE_NAME \
            --label $SERVICE_NAME \
            --image $SERVICE_NAME:latest \
            --region $AWS_REGION 2>&1 | tee push-output.txt

      - name: Deploy
        run: |
          IMAGE=$(grep -oP '":[\w.-]+"' push-output.txt | tr -d '"')
          aws lightsail create-container-service-deployment \
            --service-name $SERVICE_NAME \
            --region $AWS_REGION \
            --containers "{
              \"$SERVICE_NAME\": {
                \"image\": \"$IMAGE\",
                \"ports\": {\"3000\": \"HTTP\"},
                \"environment\": {}
              }
            }" \
            --public-endpoint "{
              \"containerName\": \"$SERVICE_NAME\",
              \"containerPort\": 3000,
              \"healthCheck\": {\"path\": \"/health\", \"intervalSeconds\": 30}
            }"
